<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <radialGradient id="glowBig" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMid" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spikeFade" gradientUnits="userSpaceOnUse" cx="160" cy="140" r="130">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="280" fill="#000000"/>

  <!-- star field -->
  <circle cx="60"  cy="50"  r="2"   fill="#FFFFFF" opacity="0.75"/>
  <circle cx="270" cy="60"  r="1.8" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="292" cy="200" r="2"   fill="#FFFFFF" opacity="0.7"/>
  <circle cx="40"  cy="222" r="1.6" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="232" cy="246" r="1.6" fill="#FFFFFF" opacity="0.55"/>
  <g fill="#FFFFFF" opacity="0.8">
    <polygon points="265,95 267,105 265,115 263,105"/>
    <polygon points="255,105 265,103 275,105 265,107"/>
  </g>

  <!-- tilted orbit ring + satellite -->
  <ellipse cx="160" cy="140" rx="130" ry="47" fill="none" stroke="#FFFFFF" stroke-opacity="0.32" stroke-width="1.8" transform="rotate(-28 160 140)"/>
  <circle cx="46.6" cy="177.7" r="10" fill="url(#glowMid)" opacity="0.6"/>
  <circle cx="46.6" cy="177.7" r="4.2" fill="#FFFFFF" opacity="0.95"/>

  <!-- the star: glow, diffraction spikes, core -->
  <circle cx="160" cy="140" r="92" fill="url(#glowBig)"/>
  <circle cx="160" cy="140" r="40" fill="url(#glowMid)"/>
  <polygon points="160,22 165.5,140 160,258 154.5,140" fill="url(#spikeFade)"/>
  <polygon points="76,140 160,135.5 244,140 160,144.5" fill="url(#spikeFade)"/>
  <circle cx="160" cy="140" r="15" fill="#FFFFFF"/>

  <!-- wordmark -->
  <text x="330" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="64" fill="#FFFFFF" letter-spacing="3">Constellation</text>
  <text x="334" y="185" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" fill="#9A9892" letter-spacing="2">think for yourself &#183; become who you actually are</text>
  <text x="334" y="228" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#5E5C57" letter-spacing="1">a private map of your thoughts, emotions &amp; behaviors &#8212; nothing ever leaves your device</text>
</svg>
